server:
  port: 8080

spring:
  application:
    name: video-analysis-backend
  datasource:
    url: jdbc:mysql://localhost:3306/video_analysis?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&rewriteBatchedStatements=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.video.analysis.dto,com.video.analysis.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.video.analysis.mapper: debug

crawler:
  python-command: ${SPIDER_PYTHON:python}
  script-path: ${SPIDER_SCRIPT_PATH:../spider/spider.py}
  max-output-lines: 3000
  ai:
    enabled: ${CRAWLER_AI_ENABLED:false}
    api-url: ${CRAWLER_AI_API_URL:https://api.openai.com/v1/chat/completions}
    model: ${CRAWLER_AI_MODEL:gpt-4o-mini}
    api-key: ${CRAWLER_AI_API_KEY:}
    timeout-seconds: 120
    max-input-chars: 120000
    temperature: 0.1
  import:
    video-batch-size: 1000
    user-batch-size: 1000
    behavior-batch-size: 5000
    dedupe-query-batch-size: 2000

